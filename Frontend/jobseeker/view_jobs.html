<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HireX Available Jobs</title>

<style>
body{
margin:0;
background:#020617;
color:#00f7ff;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.core{
position:relative;
width:420px;
padding:40px;
border-radius:50%;
border:2px solid #00f7ff;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 50px #00f7ff;
background:rgba(0,0,0,0.7);
}

.ring{
position:absolute;
border-radius:50%;
border:1px solid #00f7ff;
}

.r1{
width:460px;
height:460px;
animation:spin1 10s linear infinite;
}

.r2{
width:520px;
height:520px;
animation:spin2 14s linear infinite;
}

@keyframes spin1{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes spin2{
from{transform:rotate(360deg)}
to{transform:rotate(0deg)}
}

.pulse{
position:absolute;
border:1px solid #00f7ff;
border-radius:50%;
width:260px;
height:260px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:1;}
100%{transform:scale(1.5);opacity:0;}
}

.jobs{
text-align:center;
width:280px;
z-index:10;
}

.job-card{
border:1px solid #00f7ff;
padding:8px;
margin:8px 0;
background:black;
}

button{
width:100%;
padding:8px;
margin-top:5px;
background:#00f7ff;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px #00f7ff;
}

a{
color:#00f7ff;
text-decoration:none;
font-size:12px;
}
</style>
</head>

<body>

<div class="ring r1"></div>
<div class="ring r2"></div>

<div class="core">
<div class="pulse"></div>

<div class="jobs">

<h2>Available Jobs</h2>
<div id="jobList"></div>

<div style="margin-top:10px;">
<a href="upload-resume.html">Upload Resume</a>
</div>

</div>
</div>

<script>
fetch("http://127.0.0.1:5000/api/jobs")
.then(res => res.json())
.then(data => {

let container = document.getElementById("jobList")

data.forEach(job => {

let card = document.createElement("div")
card.className = "job-card"

let title = document.createElement("p")
title.innerText = job.title

let btn = document.createElement("button")
btn.innerText = "Apply"

btn.onclick = function(){

fetch("http://127.0.0.1:5000/api/apply",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
job_id: job.job_id,
email: localStorage.getItem("email")   // ✅ FIXED
})
})
.then(res=>res.json())
.then(()=>{
alert("Application Submitted Successfully")
})

}

card.appendChild(title)
card.appendChild(btn)

container.appendChild(card)

})

})
</script>

</body>
</html>

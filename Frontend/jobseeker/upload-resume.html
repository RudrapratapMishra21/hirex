
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HireX Upload Resume</title>

<style>

body{
margin:0;
background:#020617;
color:#00f7ff;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CORE */

.core{
position:relative;
width:380px;
padding:40px;
border-radius:50%;
border:2px solid #00f7ff;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 50px #00f7ff;
background:rgba(0,0,0,0.7);
}

/* RINGS */

.ring{
position:absolute;
border-radius:50%;
border:1px solid #00f7ff;
}

.r1{
width:420px;
height:420px;
animation:spin1 10s linear infinite;
}

.r2{
width:480px;
height:480px;
animation:spin2 14s linear infinite;
}

@keyframes spin1{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes spin2{
from{transform:rotate(360deg)}
to{transform:rotate(0deg)}
}

/* ENERGY PULSE */

.pulse{
position:absolute;
border:1px solid #00f7ff;
border-radius:50%;
width:240px;
height:240px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:1;}
100%{transform:scale(1.5);opacity:0;}
}

/* FORM AREA */

.upload{
text-align:center;
width:260px;
z-index:10;
}

h2{
margin-bottom:5px;
}

.subtitle{
font-size:13px;
opacity:0.8;
margin-bottom:15px;
}

/* FILE INPUT */

input[type="file"]{
width:100%;
padding:10px;
margin:10px 0;
background:black;
border:1px solid #00f7ff;
color:#00f7ff;
}

/* BUTTON */

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00f7ff;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px #00f7ff;
}

/* LINKS */

a{
color:#00f7ff;
text-decoration:none;
font-size:12px;
}

</style>
</head>

<body>

<div class="ring r1"></div>
<div class="ring r2"></div>

<div class="core">

<div class="pulse"></div>

<div class="upload">

<h2>Upload Resume</h2>
<div class="subtitle">Submit your resume to HireX</div>

<!-- ✅ FIXED FORM -->
<form id="uploadForm" enctype="multipart/form-data">

<input type="file" name="resume" required>

<button type="submit" id="uploadBtn">Upload Resume</button>

</form>

<div style="margin-top:10px;">
<a href="view_jobs.html">Back to Jobs</a>
</div>

</div>

</div>

<!-- ✅ FIXED SCRIPT -->
<script>
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const button = document.getElementById("uploadBtn");
    button.innerText = "Uploading...";
    button.disabled = true;

    const formData = new FormData(this);

    try {
        const response = await fetch("http://127.0.0.1:5000/api/upload", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            alert("✅ Resume uploaded successfully!");
            window.location.href = "view_jobs.html";
        } else {
            alert("❌ Upload failed: " + (data.error || "Unknown error"));
        }

    } catch (err) {
        alert("⚠️ Server error. Make sure backend is running.");
        console.error(err);
    }

    button.innerText = "Upload Resume";
    button.disabled = false;
});
</script>

</body>
</html>

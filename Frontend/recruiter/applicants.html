<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HireX Applicants</title>

<style>

body{
margin:0;
background:#020617;
color:#00f7ff;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CORE */

.core{
position:relative;
width:420px;
padding:40px;
border-radius:50%;
border:2px solid #00f7ff;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 50px #00f7ff;
background:rgba(0,0,0,0.7);
}

/* RINGS */

.ring{
position:absolute;
border-radius:50%;
border:1px solid #00f7ff;
}

.r1{
width:460px;
height:460px;
animation:spin1 10s linear infinite;
}

.r2{
width:520px;
height:520px;
animation:spin2 14s linear infinite;
}

@keyframes spin1{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes spin2{
from{transform:rotate(360deg)}
to{transform:rotate(0deg)}
}

/* ENERGY PULSE */

.pulse{
position:absolute;
border:1px solid #00f7ff;
border-radius:50%;
width:260px;
height:260px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:1;}
100%{transform:scale(1.5);opacity:0;}
}

/* APPLICANTS AREA */

.applicants{
text-align:center;
width:280px;
z-index:10;
}

h2{
margin-bottom:10px;
}

.subtitle{
font-size:13px;
opacity:0.8;
margin-bottom:15px;
}

/* LIST */

.list{
text-align:left;
font-size:14px;
margin-top:10px;
}

.list div{
padding:6px 0;
border-bottom:1px solid #00f7ff;
}

</style>
</head>

<body>

<div class="ring r1"></div>
<div class="ring r2"></div>

<div class="core">

<div class="pulse"></div>

<div class="applicants">

<h2>Job Applicants</h2>
<div class="subtitle">Candidates who applied</div>

<div class="list" id="applicantsList"></div>

</div>

</div>

<script>

fetch("http://127.0.0.1:5000/api/applications")
.then(res => res.json())
.then(data => {

let container = document.getElementById("applicantsList")

container.innerHTML=""

data.forEach(app => {

let row = document.createElement("div")

row.innerText = "Applicant: " + app.email + " | Job ID: " + app.job_id

container.appendChild(row)

})

})

.catch(err => console.log(err))

</script>

</body>
</html>

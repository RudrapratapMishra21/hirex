<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HireX Resume Ranking</title>

<style>

body{
margin:0;
background:#020617;
color:#00f7ff;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CORE */

.core{
position:relative;
width:420px;
padding:40px;
border-radius:50%;
border:2px solid #00f7ff;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 50px #00f7ff;
background:rgba(0,0,0,0.7);
}

/* RINGS */

.ring{
position:absolute;
border-radius:50%;
border:1px solid #00f7ff;
}

.r1{
width:460px;
height:460px;
animation:spin1 10s linear infinite;
}

.r2{
width:520px;
height:520px;
animation:spin2 14s linear infinite;
}

@keyframes spin1{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes spin2{
from{transform:rotate(360deg)}
to{transform:rotate(0deg)}
}

/* ENERGY PULSE */

.pulse{
position:absolute;
border:1px solid #00f7ff;
border-radius:50%;
width:260px;
height:260px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:1;}
100%{transform:scale(1.5);opacity:0;}
}

/* RANK AREA */

.rank{
text-align:center;
width:300px;
z-index:10;
}

h2{
margin-bottom:8px;
}

.subtitle{
font-size:13px;
opacity:0.8;
margin-bottom:15px;
}

textarea{
width:100%;
padding:10px;
height:80px;
background:black;
border:1px solid #00f7ff;
color:#00f7ff;
resize:none;
}

/* BUTTON */

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00f7ff;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px #00f7ff;
}

/* RESULTS */

.results{
margin-top:15px;
text-align:left;
font-size:14px;
}

.results div{
padding:5px 0;
border-bottom:1px solid #00f7ff;
}

</style>
</head>

<body>

<div class="ring r1"></div>
<div class="ring r2"></div>

<div class="core">

<div class="pulse"></div>

<div class="rank">

<h2>AI Resume Ranking</h2>
<div class="subtitle">Match candidates with job description</div>

<textarea id="jobDesc" placeholder="Enter Job Description"></textarea>

<button onclick="getRanking()">Analyze Resumes</button>

<div class="results" id="result"></div>

</div>

</div>

<script>

function getRanking(){

let jobDesc = document.getElementById("jobDesc").value

fetch("http://127.0.0.1:5000/api/rank",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
job_description: jobDesc
})

})

.then(res=>res.json())

.then(data=>{

let container = document.getElementById("result")
container.innerHTML=""

data.forEach(item=>{

let row = document.createElement("div")

row.innerText = item.candidate + " — " + item.match_percent + "% match"

container.appendChild(row)

})

})

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HireX Post Job</title>

<style>

body{
margin:0;
background:#020617;
color:#00f7ff;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CORE */

.core{
position:relative;
width:420px;
padding:40px;
border-radius:50%;
border:2px solid #00f7ff;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 50px #00f7ff;
background:rgba(0,0,0,0.7);
}

/* RINGS */

.ring{
position:absolute;
border-radius:50%;
border:1px solid #00f7ff;
}

.r1{
width:460px;
height:460px;
animation:spin1 10s linear infinite;
}

.r2{
width:520px;
height:520px;
animation:spin2 14s linear infinite;
}

@keyframes spin1{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

@keyframes spin2{
from{transform:rotate(360deg)}
to{transform:rotate(0deg)}
}

/* ENERGY PULSE */

.pulse{
position:absolute;
border:1px solid #00f7ff;
border-radius:50%;
width:260px;
height:260px;
animation:pulse 2.5s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:1;}
100%{transform:scale(1.5);opacity:0;}
}

/* FORM */

.post{
text-align:center;
width:280px;
z-index:10;
}

h2{
margin-bottom:8px;
}

.subtitle{
font-size:13px;
opacity:0.8;
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0;
background:black;
border:1px solid #00f7ff;
color:#00f7ff;
}

textarea{
resize:none;
height:70px;
}

/* BUTTON */

button{
width:100%;
padding:10px;
margin-top:10px;
background:#00f7ff;
border:none;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px #00f7ff;
}

</style>
</head>

<body>

<div class="ring r1"></div>
<div class="ring r2"></div>

<div class="core">

<div class="pulse"></div>

<div class="post">

<h2>Post Job</h2>
<div class="subtitle">Create a new job listing</div>

<form id="jobForm">

<input type="text" id="title" placeholder="Job Title" required>

<textarea id="description" placeholder="Job Description" required></textarea>

<input type="text" id="skills" placeholder="Required Skills">

<button type="submit">Post Job</button>

</form>

</div>

</div>

<script>

document.getElementById("jobForm").addEventListener("submit", function(e){

e.preventDefault()

fetch("http://127.0.0.1:5000/api/postjob",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

title:document.getElementById("title").value,
description:document.getElementById("description").value,
skills:document.getElementById("skills").value

})

})
.then(res=>res.json())
.then(data=>{
alert("Job Posted Successfully")
})

})

</script>

</body>
</html>
